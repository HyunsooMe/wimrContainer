<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.conditional.min.css"
    />
    <link href="/css/login.css" rel="stylesheet" />
    <link href="/css/header.css" rel="stylesheet" />
    <link href="/css/common.css" rel="stylesheet" />

    
    <title>login</title>
  </head>
  <body class="noscroll">
    <header th:replace="~{fragments/header::header}"></header>

    <div id="loginBox" class="centerBox pico">
      <form th:action="@{/Wimr/login}" method="post" th:object="${User}">
        Login ID:
        <input
          type="text"
          id="loginId"
          th:value="*{loginId}"
          class="form_input"
        />
        <br />
        Login Password:
        <input
          type="password"
          id="password"
          th:value="*{password}"
          class="form_input"
        />
        <br />
        <button type="submit">Login</button>
      </form>
    </div>

    <script>
      //로그인 실패 메시지
      let message = "[[${msg}]]";
      if (message != "") {
        alert(message);
      }
    </script>
  </body>
</html>
