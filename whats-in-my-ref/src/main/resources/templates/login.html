<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.conditional.min.css"
    />
    <link href="/css/login.css" rel="stylesheet" />
    <link href="/css/header.css" rel="stylesheet" />
    <link href="/css/common.css" rel="stylesheet" />

    
    <title>login</title>
  </head>
  <body class="noscroll">
    <header th:replace="~{fragments/header::header}"></header>
    <div class="sidebar-wrap"><div th:replace="~{fragments/sideNav::sidebar}"/></div>

    <div id="loginBox" class="centerBox pico justify-content-center align-items-center">
      <div class="form-wrap">
        <form name="login-form" id="login-form" th:action="@{/Wimr/login}" method="post" th:object="${User}">
          Login ID:
          <input
            type="text"
            id="loginId"
            name="loginId"
            th:value="*{loginId}"
            class="form_input"
          />
          <br />
          Login Password:
          <input
            type="password"
            id="password"
            name="password"
            th:value="*{password}"
            class="form_input"
            style="margin-bottom: 0;"
          />
          <div class="link-div">
            <a href="/Wimr/findACC">아이디/비밀번호 찾기</a>
            <a href="/Wimr/register">회원가입</a>
          </div>
          <button type="button" onclick="loginChk()">Login</button>
        </form>
      </div>
    </div>
    
    

    <script src="/js/login.js"></script>
    <script src="/js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  </body>
</html>
