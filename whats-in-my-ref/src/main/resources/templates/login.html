<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.conditional.min.css"
    />
    <link href="/css/login.css" rel="stylesheet" />
    <link href="/css/header.css" rel="stylesheet" />
    <link href="/css/common.css" rel="stylesheet" />

    
    <title>login</title>
  </head>
  <body class="noscroll">
    <header th:replace="~{fragments/header::header}"></header>
    <div class="sidebar-wrap"><div th:replace="~{fragments/sideNav::sidebar}"/></div>

    <div id="loginBox" class="centerBox pico justify-content-center align-items-center">
      <form name="login-form" th:action="@{/Wimr/login}" method="post" th:object="${User}">
        Login ID:
        <input
          type="text"
          id="loginId"
          name="loginId"
          th:value="*{loginId}"
          class="form_input"
        />
        <br />
        Login Password:
        <input
          type="password"
          id="password"
          name="password"
          th:value="*{password}"
          class="form_input"
        />
        <br />
        <button type="button" onclick="loginChk()">Login</button>
      </form>
      <div class="link-div">
        <a>아이디/비밀번호 찾기</a>
        <a href="/Wimr/register">회원가입</a>
      </div>
    </div>
    

    <script src="/js/login.js" />
  </body>
</html>
