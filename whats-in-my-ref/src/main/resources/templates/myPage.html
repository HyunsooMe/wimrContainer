<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
    
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.conditional.min.css"
  />
    <link href="/css/myPage.css" rel="stylesheet"/>
    <link href="/css/header.css" rel="stylesheet" />
    <link href="/css/common.css" rel="stylesheet" />

    <title>my page</title>
</head>
<body >
    <header th:replace="~{fragments/header::header}"/>
    <div class="sidebar-wrap"><div th:replace="~{fragments/sideNav::sidebar}"/></div>
    
    <div class="emptyBox"></div>
    
    <div class="container myPage-container pico"> 
        <div id="userImg" class="item justify-content-center display-flex"><img th:src="${imagePath != null ? imagePath : '/img/userDefaultImg.png'}"/></div>      <!--이미지를 못 받았을 때 default 이미지 경로(현재 /img/pen.jpg)-->
        <div id="userName" class="item justify-content-center display-flex" ><strong><u><span th:text="userName"></span></u></strong></div>
        <div class="infoTitle item">Self-introduce:<article id="introduce"><sapn th:text="${introduce}"></article></div>
        <div id="userItem">
            <div class="infoTitle item">Email:<article id="email"><span th:text="${eamil}"></span></article></div>
            
            <div class="my-recipe-part item" >내 레시피:      
                <div class="my-recipe-grid" >  
                    <div class="my-recipe" th:onclick="|redirectToPage('/Wimr/recipe?recipeNo='+${my_recipe.recipeno})|" th:each="my_recipe : ${myRecipeList}">  <!--타임리프 값:"myRecipeList" (Recipe 엔티티의 배열 or List)-->
                        <div class="food-img"><img th:src="*{picture != null ? picture : '/img/ingredients.jpg'}"/></div>
                        <div class="food-name display-flex justify-content-center align-items-center" th:text="*{title}"></div>
                    </div>
                </div>
            </div>

            <div class="favorite-recipe-part item"></div>
        </div>
    </div>

    <script src="/js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</body>
