<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/img/elephant.png" rel="shortcut icon" type="image/x-icon">
    <title>Session Home</title>
</head>
<body>
    <form th:action="@{/register}" method="post" th:object="${User}">
        Login ID: <input type="text" id="loginId" th:field="*{loginId}" class="form_input" /> <br/>
        Login Password: <input type="text" id="password" th:field="*{password}" class="form_input" /> <br/>
        Name: <input type="text" id="name" th:field="*{name}" class="form_input" /> <br/>
        <button type="submit">register</button>
    </form>
</body>
</html>
