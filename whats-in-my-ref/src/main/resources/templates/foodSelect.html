<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.conditional.min.css"
    />
    <link href="/img/elephant.png" rel="shortcut icon" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" href="/css/foodSelectStyle.css" />
  </head>
  <body>
    <header th:replace="~{fragments/header::header}"></header>
    <div class="sidebar-wrap"><div th:replace="~{fragments/sideNav::sidebar}"/></div>
    
    <h1>레시피 검색</h1>
    <div class="food_list">
      <div class="food_search">
        <input
          type="text"
          id="search"
          placeholder="재료 입력"
          autocomplete="off"
        />
        <button type="button" id="searchBtn">추가</button>
        <button type="button" id="findRecipeBtn">검색</button>
      </div>
      <!-- 자동완성 단어 리스트 -->
      <div class="autocomplete"></div>
      <!-- 선택한 재료 -->
      <div class="selectedFood">
        <p>선택한 재료</p>
        <div class="addedlist"></div>
      </div>
      
      <div class="all_food">
        <!-- 고기 체크박스 -->
        <div class="food_item">
          <div class="item_title">고기</div>
          <div class="item_content">
            <ul class="meat_item">
              <li class="meat">
                <label title="돼지고기">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="돼지고기"
                    name="고기"
                  />
                  돼지고기
                </label>
              </li>
              <li class="meat">
                <label title="소고기">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="소고기"
                    name="고기"
                  />
                  소고기
                </label>
              </li>
              <li class="meat">
                <label title="닭고기">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="닭고기"
                    name="고기"
                  />
                  닭고기
                </label>
              </li>
              <li class="meat">
                <label title="오리고기">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="오리고기"
                    name="고기"
                  />
                  오리고기
                </label>
              </li>
              <li class="meat">
                <label title="양고기">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="양고기"
                    name="고기"
                  />
                  양고기
                </label>
              </li>
            </ul>
          </div>
        </div>

        <!-- 채소 체크박스 -->
        <div class="food_item">
          <div class="item_title">채소</div>
          <div class="item_content">
            <ul class="vegetable_item">
              <li class="vegetable">
                <label title="오이">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="오이"
                    name="채소"
                  />
                  오이
                </label>
              </li>
              <li class="vegetable">
                <label title="당근">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="당근"
                    name="채소"
                  />
                  당근
                </label>
              </li>
              <li class="vegetable">
                <label title="감자">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="감자"
                    name="채소"
                  />
                  감자
                </label>
              </li>
              <li class="vegetable">
                <label title="고구마">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="고구마"
                    name="채소"
                  />
                  고구마
                </label>
              </li>
              <li class="vegetable">
                <label title="대파">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="대파"
                    name="채소"
                  />
                  대파
                </label>
              </li>
            </ul>
          </div>
        </div>

        <!-- 과일 체크박스 -->
        <div class="food_item">
          <div class="item_title">과일</div>
          <div class="item_content">
            <ul class="fruit_item">
              <li class="fruit">
                <label title="사과">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="사과"
                    name="과일"
                  />
                  사과
                </label>
              </li>
              <li class="fruit">
                <label title="배">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="배"
                    name="과일"
                  />
                  배
                </label>
              </li>
              <li class="fruit">
                <label title="딸기">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="딸기"
                    name="과일"
                  />
                  딸기
                </label>
              </li>
              <li class="fruit">
                <label title="수박">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="수박"
                    name="과일"
                  />
                  수박
                </label>
              </li>
              <li class="fruit">
                <label title="포도">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="포도"
                    name="과일"
                  />
                  포도
                </label>
              </li>
            </ul>
            
          </div>
        </div>

        <!-- 해산물 체크박스 -->
        <div class="food_item">
          <div class="item_title">해산물</div>
          <div class="item_content">
            <ul class="seafood_item">
              <li class="seafood">
                <label title="새우">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="새우"
                    name="해산물"
                  />
                  새우
                </label>
              </li>
              <li class="seafood">
                <label title="고등어">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="고등어"
                    name="해산물"
                  />
                  고등어
                </label>
              </li>
              <li class="seafood">
                <label title="참치">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="참치"
                    name="해산물"
                  />
                  참치
                </label>
              </li>
              <li class="seafood">
                <label title="오징어">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="오징어"
                    name="해산물"
                  />
                  오징어
                </label>
              </li>
              <li class="seafood">
                <label title="문어">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="문어"
                    name="해산물"
                  />
                  문어
                </label>
              </li>
            </ul>
            
          </div>
        </div>

        <!-- 유제품 체크박스 -->
        <div class="food_item">
          <div class="item_title">유제품</div>
          <div class="item_content">
            <ul class="dairy_item">
              <li class="dairy">
                <label title="우유">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="우유"
                    name="유제품"
                  />
                  우유
                </label>
              </li>
              <li class="dairy">
                <label title="치즈">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="치즈"
                    name="유제품"
                  />
                  치즈
                </label>
              </li>
              <li class="dairy">
                <label title="버터">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="버터"
                    name="유제품"
                  />
                  버터
                </label>
              </li>
              <li class="dairy">
                <label title="요거트">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="요거트"
                    name="유제품"
                  />
                  요거트
                </label>
              </li>
              <li class="dairy">
                <label title="아이스크림">
                  <input
                    type="checkbox"
                    class="checkbox"
                    value="아이스크림"
                    name="유제품"
                  />
                  아이스크림
                </label>
              </li>
            </ul>
            
        </div>
      </div>
    </div>
    <div id="recipe-results"></div>
    <script src="/js/script.js"></script>
  </body>
</html>
