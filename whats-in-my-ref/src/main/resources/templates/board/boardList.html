<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.conditional.min.css"
    />
    <link href="/img/elephant.png" rel="shortcut icon" type="image/x-icon" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/boardListStyle.css}" />
  </head>
  <body>
    <header th:replace="~{fragments/header::header}"></header>
    <div class="board-wrap">
      <h2>자유게시판</h2>
      <div class="table_wrap">
        <table>
          <thead>
            <tr>
              <th>번호</th>
              <th>글제목</th>
              <th>작성자</th>
              <th>작성일</th>
              <th>조회수</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="board : ${boardList}">
              <td th:text="${board.id}"></td>
              <!-- localhost:8080/boardList?id=board.id -->
              <td>
                <a
                  th:text="${board.title}"
                  th:href="@{/boardView(id=${board.id})}"
                ></a>
              </td>
              <td th:text="${board.nickname}"></td>
              <td
                th:text="${#temporals.format(board.created_date, 'yyyy-MM-dd')}"
              ></td>
              <td th:text="${board.viewcount}"></td>
            </tr>
          </tbody>
        </table>
        <div class="btn">
          <a th:href="@{/boardForm}" id="btn">글쓰기</a>
        </div>
      </div>
      <div class="pages">
        <th:block th:each="page : ${#numbers.sequence(startPage, endPage)}">
          <!-- 페이지가 현재 페이지와 다를 때 -->
          <a
            th:if="${page != nowPage}"
            th:href="@{/boardList(page = ${page-1})}"
            th:text="${page}"
          ></a>
          <!-- 페이지가 현재 페이지와 같을 때 -->
          <strong
            th:if="${page == nowPage}"
            th:text="${page}"
            style="color: red"
          ></strong>
        </th:block>
      </div>
    </div>
  </body>
</html>
