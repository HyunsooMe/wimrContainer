<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>작성한 게시글</h2>

    <form id="viewContent">
      <div id="title">제목: <span th:text="${post.title}"></span></div>
      <div id="writer">작성자: <span th:text="${post.writer}"></span></div>
      <div id="date">작성일: <span th:text="${post.date}"></span></div>
      <div id="content">내용: <span th:text="${post.content}"></span></div>
    </form>
    <button id="modify">수정</button>

    <a href="/boardList">뒤로가기</a>
    <button id="delete">삭제</button>
  </body>
</html>
